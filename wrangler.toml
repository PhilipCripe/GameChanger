# Cloudflare Pages project configuration
# Docs: https://developers.cloudflare.com/pages/configuration/wrangler-configuration/

name = "gamechanger"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
CHAIN_ID               = "43113"
NETWORK_NAME           = "Avalanche Fuji Testnet"
RPC_URL                = "https://api.avax-test.network/ext/bc/C/rpc"
STRIPE_PUBLISHABLE_KEY = ""   # set in Cloudflare Pages dashboard when ready
ADMIN_WALLET           = "0xAB0998301e631c5384ea17D2f3C164556bdfe30F"

# ─── Secrets — set via `wrangler secret put` or Pages dashboard ───────────────
# ADMIN_TOKEN          (encrypted) — admin panel bearer token
# CONTRACT_ADDRESS     (encrypted) — deployed contract address
# WDK_API_KEY          (encrypted) — Tether WDK API key
# STRIPE_SECRET_KEY    (encrypted) — Stripe secret key (enables card payments)
# STRIPE_WEBHOOK_SECRET (encrypted) — Stripe webhook signing secret

# ─── KV namespace ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "GCH_STORE"
id      = "4ac73de3a1534d64a21337f78e692355"

# ─── R2 bucket (file uploads) ─────────────────────────────────────────────────
# 1. Create: npx wrangler r2 bucket create gamechanger-assets
# 2. Uncomment:
#
# [[r2_buckets]]
# binding     = "ASSETS_BUCKET"
# bucket_name = "gamechanger-assets"
